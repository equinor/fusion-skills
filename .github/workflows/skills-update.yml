# ============================================================================
# Fusion Skills Update Workflow
# ============================================================================
#
# PURPOSE:
#   Automatically refresh GitHub Copilot Agent Skills from upstream
#   repositories using `npx skills add` and create a pull request with
#   detected changes and their changelogs.
#
# HOW TO USE THIS WORKFLOW:
#   In your repository, create `.github/workflows/skills-update.yml`:
#
#   name: Upgrade Agent Skills
#   on:
#     schedule:
#       # Every Monday at 2 AM UTC
#       - cron: '0 2 * * 1'
#     workflow_dispatch:  # Also allow manual trigger
#   
#   permissions:
#     contents: write      # Commit skill changes to repository
#     pull-requests: write # Create and manage pull requests
#   
#   jobs:
#     upgrade:
#       uses: equinor/fusion-skills/.github/workflows/skills-update.yml@main
#
#   To also disable deprecation cleanup or customize it:
#
#   jobs:
#     upgrade:
#       uses: equinor/fusion-skills/.github/workflows/skills-update.yml@main
#       with:
#         skip-deprecation-cleanup: false  # set true to disable
#         draft-deprecation-prs: false     # set true for draft PRs
#         skip-if-rejected-pr-exists: true # respect rejected PRs
#
#   Notes:
#   - Replace @main with a specific version tag to pin to a release
#   - Adjust cron schedule to your preferred update frequency
#   - Use workflow_dispatch for manual-only updates if preferred
#
# REQUIRED REPOSITORY SETUP:
#   Repositories using this workflow must:
#   1. Have `.agents/skills/` directory (will be created if missing)
#   2. Grant workflow write access to contents and pull requests
#      (configured in the calling workflow's permissions block)
#   3. The workflow uses github.token automatically — no secrets setup needed
#
# HOW IT WORKS:
#   1. Checkout repository with full git history (for accurate diffs)
#   2. Install Node.js 24 and cache npm dependencies
#   3. Run `npx skills add` to download latest skills from source repos
#   4. Detect which skills changed/were added
#   5. Build a detailed PR body with CHANGELOG excerpts for each skill
#   6. Create a PR with one commit containing all skill updates
#   7. Scan refreshed skills for `metadata.status: deprecated` or `archived` markers
#   8. For each deprecated skill, create one removal PR with migration guidance
#   9. Report summary to workflow run (GitHub Actions UI)
#
# DEPRECATION CLEANUP:
#   After upgrading, the workflow scans all installed skills for deprecation
#   markers in their SKILL.md frontmatter. For each deprecated/archived skill it:
#   - Creates a dedicated branch and PR to remove the skill
#   - Updates the lock file to drop the entry
#   - Includes successor recommendation if available upstream
#   - Respects previously-rejected removal PRs (won't re-propose)
#
# ============================================================================

name: Fusion Skills Update

on:
  schedule:
    # Every Monday at 2 AM UTC
    - cron: "0 8 * * 1-5"  # Weekdays at 8 AM UTC
  workflow_dispatch:  # Also allow manual trigger
  workflow_call:  # Allow calling as reusable workflow
    inputs:
      skip-deprecation-cleanup:
        description: Disable the deprecation scan and removal PRs
        required: false
        type: boolean
        default: false
      draft-deprecation-prs:
        description: Create deprecation removal PRs as drafts
        required: false
        type: boolean
        default: false
      skip-if-rejected-pr-exists:
        description: Skip proposing removal when a previous PR was closed without merge
        required: false
        type: boolean
        default: true

permissions:
  # Write permissions required to:
  # - Commit skill changes to repository
  # - Create and manage pull requests
  contents: write
  pull-requests: write

jobs:
  upgrade:
    name: Upgrade Agent Skills
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      skipped: ${{ steps.install_skills.outputs.skipped }}

    steps:
      # -----------------------------------------------------------------------
      # STEP 1: Prepare repository checkout
      # -----------------------------------------------------------------------
      # Fetch full git history to support accurate diff detection of changes
      # (needed to calculate which skills were added/modified)
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Full history for accurate git diff

      # -----------------------------------------------------------------------
      # STEP 2: Setup runtime environment
      # -----------------------------------------------------------------------
      # Install Node.js 24 for running skill commands.
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      # -----------------------------------------------------------------------
      # STEP 3: Download and refresh agent skills
      # -----------------------------------------------------------------------
      # Run `npx skills add` to fetch latest versions from upstream skill
      # repositories. This command:
      #   - Clones/symlinks remote skill repos into .agents/skills/
      #   - Overwrites existing skills with latest versions
      #   - Creates .agents/skills if it doesn't exist
      #
      # OUTPUT:
      #   - skipped: Set to 'true' if npx CLI unavailable (warning logged)
      #   - Other steps will detect and skip PR creation if skipped=true
      - name: Upgrade skills (re-install to refresh)
        id: install_skills
        shell: bash
        run: |
          set -euo pipefail

          echo "Running skills upgrade..."

          # Verify npx/Node.js setup is working; gracefully skip if not available
          if ! npx skills --version >/dev/null 2>&1; then
            echo "Warning: npx skills CLI not accessible — skipping upgrade."
            echo "skipped=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Install/update skills from source repositories
          # Refresh already-installed skills to their latest versions
          npx skills experimental_install || {
            echo "::warning::npx skills experimental_install failed — continuing to check for changes anyway"
          }

      # -----------------------------------------------------------------------
      # STEP 4: Detect what changed
      # -----------------------------------------------------------------------
      # Compare working directory against HEAD to find which skills were
      # added/modified. Results are stored as outputs for later steps:
      #   - clean: true if no changes detected
      #   - changed_count: number of unique skills that changed
      #   - changed_skills: JSON array of skill directory names
      - name: Check for changes in .agents/skills
        id: changes
        shell: bash
        run: |
          set -euo pipefail

          # Check if .agents/skills/ has any unstaged changes
          if git diff --quiet --exit-code HEAD -- .agents/skills/; then
            echo "clean=true" >> "$GITHUB_OUTPUT"
            echo "changed_count=0" >> "$GITHUB_OUTPUT"
            echo "No changes detected after upgrade."
          else
            echo "clean=false" >> "$GITHUB_OUTPUT"
            
            # Count unique skill directories that changed
            # (git diff lists files; we need skill root dirs)
            changed_files=$(git diff --name-only HEAD -- .agents/skills/ | awk -F/ '{print $3}' | sort -u | wc -l)
            echo "changed_count=$changed_files" >> "$GITHUB_OUTPUT"

            # Extract unique skill directory names and format as JSON array
            # Example output: ["skill-1", "skill-2"]
            mapfile -t changed_skills < <(git diff --name-only HEAD -- .agents/skills/ | awk -F/ '/^\.agents\/skills\// {print $3}' | sort -u)
            skills_json=$(jq -nc '$ARGS.positional' --args "${changed_skills[@]}")
            echo "changed_skills=$skills_json" >> "$GITHUB_OUTPUT"

            echo "Detected changes in $changed_files skill(s)."
          fi

      # -----------------------------------------------------------------------
      # STEP 5: Build detailed pull request body
      # -----------------------------------------------------------------------
      # For each changed skill, extract CHANGELOG entries and build a formatted
      # markdown PR body that summarizes:
      #   - What skills changed
      #   - New/updated changelog entries for transparency
      #
      # This step only runs if changes were detected (skips if clean=true)
      - name: Build detailed PR body
        if: steps.changes.outputs.clean == 'false' && steps.changes.outputs.changed_count != '0'
        id: pr_body
        shell: bash
        env:
          CHANGED_SKILLS: ${{ steps.changes.outputs.changed_skills }}
        run: |
          set -euo pipefail

          # Initialize PR body with header and summary
          cat << EOF > pr-body.md
          ## Skills Upgrade

          Automated run of \`npx skills update\` to update agent skills to their latest versions.
          **Date:** $(date -u +"%Y-%m-%d %H:%M UTC")
          **Node version:** 24

          ## Summary
          - Changed / added skills: ${{ steps.changes.outputs.changed_count }}

          ## Updated Skills
          EOF

          # For each changed skill, append its name and CHANGELOG details
          jq -r '.[]' <<< "$CHANGED_SKILLS" | while read -r skill; do
            echo "- **$skill**" >> pr-body.md

            changelog=".agents/skills/$skill/CHANGELOG.md"
            if [ -f "$changelog" ]; then
              echo "  <details><summary>CHANGELOG additions for $skill</summary>" >> pr-body.md
              echo "" >> pr-body.md

              # Two modes depending on whether this is a new or existing file:
              if git ls-files --error-unmatch "$changelog" >/dev/null 2>&1; then
                # Existing file: show only new additions (lines starting with +)
                git diff -U0 -- "$changelog" | sed -n '/^+[^+]/p' | sed 's/^+//' | sed '/^# Changelog$/d' >> pr-body.md 2>/dev/null || true
              else
                # New file: show full content (minus header)
                sed '/^# Changelog$/d' "$changelog" >> pr-body.md
              fi

              echo "" >> pr-body.md
              echo "</details>" >> pr-body.md
            else
              echo "  _No changelog updates found_" >> pr-body.md
            fi
            echo "" >> pr-body.md
          done

      # -----------------------------------------------------------------------
      # STEP 6: Create pull request with skill updates
      # -----------------------------------------------------------------------
      # Commit all skill changes in one shot and create a PR for review.
      # The PR links to this workflow run for audit trail.
      #
      # This step only runs if changes were detected (skips if clean=true)
      - name: Create Pull Request
        if: steps.changes.outputs.clean == 'false' && steps.changes.outputs.changed_count != '0'
        id: cpr
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ github.token }}
          commit-message: "chore(skills): upgrade agent skills"
          branch: chore/skills-upgrade
          delete-branch: true  # Clean up branch after PR merge
          title: "chore(skills): upgrade agent skills"
          body-path: pr-body.md
          labels: |
            chore
            skills
            dependencies
          draft: false  # Create as ready for review

      # -----------------------------------------------------------------------
      # STEP 7: Report upgrade summary to GitHub Actions UI
      # -----------------------------------------------------------------------
      - name: Upgrade Summary
        if: always()
        shell: bash
        run: |
          set -euo pipefail

          echo "## Skills Upgrade Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "- Status: ${{ steps.changes.outputs.clean == 'true' && 'No changes' || 'Changes detected' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Skills changed: ${{ steps.changes.outputs.changed_count || '0' }}" >> "$GITHUB_STEP_SUMMARY"
          if [ -n "${{ steps.cpr.outputs.pull-request-url }}" ]; then
            echo "- Pull request: ${{ steps.cpr.outputs.pull-request-url }}" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- No PR created (no changes or skipped)" >> "$GITHUB_STEP_SUMMARY"
          fi

          if [ "${{ steps.install_skills.outputs.skipped }}" = "true" ]; then
            echo "- Warning: Skills CLI step was skipped — check Node/npx setup." >> "$GITHUB_STEP_SUMMARY"
          fi

  # =========================================================================
  # JOB 2: Detect deprecated skills
  # =========================================================================
  # After the upgrade job refreshes local skill copies, scan all installed
  # skills for `metadata.status: deprecated` or `archived` in their SKILL.md
  # frontmatter. Outputs a JSON array of deprecated skill directory names for
  # the removal matrix job.
  detect_deprecated:
    name: Detect deprecated skills
    needs: upgrade
    if: inputs.skip-deprecation-cleanup != true
    runs-on: ubuntu-latest
    outputs:
      has_deprecated: ${{ steps.scan.outputs.has_deprecated }}
      deprecated_count: ${{ steps.scan.outputs.deprecated_count }}
      deprecated_skills: ${{ steps.scan.outputs.deprecated_skills }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      # -------------------------------------------------------------------
      # Refresh skills so metadata is current (mirrors upgrade step)
      # -------------------------------------------------------------------
      - name: Refresh skills for deprecation scan
        if: needs.upgrade.outputs.skipped != 'true'
        shell: bash
        run: |
          set -euo pipefail

          if npx skills --version >/dev/null 2>&1; then
            npx skills experimental_install || {
              echo "::warning::Skills refresh failed — scanning existing local copies."
            }
          else
            echo "::warning::npx skills CLI not accessible — scanning existing local copies."
          fi

      # -------------------------------------------------------------------
      # Scan installed skills for status: deprecated or archived via CLI
      # -------------------------------------------------------------------
      - name: Scan for deprecated skills
        id: scan
        shell: bash
        run: |
          set -euo pipefail

          deprecated_skills=()
          total=0

          # Use the CLI to get installed skills with their actual paths
          skills_json=$(npx -y skills list --json 2>/dev/null || echo '[]')

          while IFS=$'\t' read -r name skill_path; do
            [ -z "$name" ] && continue
            total=$((total + 1))

            skill_md="$skill_path/SKILL.md"
            [ -f "$skill_md" ] || continue

            # Extract YAML frontmatter (content between first --- pair)
            frontmatter=$(awk '/^---$/{if(++c==2)exit}c==1' "$skill_md")

            # Check for status: deprecated or archived (quoted or unquoted)
            if printf '%s\n' "$frontmatter" | grep -qE '^\s*status:\s*"?(deprecated|archived)"?\s*$'; then
              deprecated_skills+=("$name")
              echo "Deprecated/archived skill detected: $name"
            fi
          done < <(printf '%s' "$skills_json" | jq -r '.[] | [.name, .path] | @tsv')

          if [ ${#deprecated_skills[@]} -eq 0 ]; then
            echo "has_deprecated=false" >> "$GITHUB_OUTPUT"
            echo "deprecated_count=0" >> "$GITHUB_OUTPUT"
            echo "deprecated_skills=[]" >> "$GITHUB_OUTPUT"
            echo "No deprecated skills detected."
          else
            json=$(jq -nc '$ARGS.positional' --args "${deprecated_skills[@]}")
            echo "has_deprecated=true" >> "$GITHUB_OUTPUT"
            echo "deprecated_count=${#deprecated_skills[@]}" >> "$GITHUB_OUTPUT"
            echo "deprecated_skills=$json" >> "$GITHUB_OUTPUT"
          fi

          # Report to workflow summary
          {
            echo "## Deprecation Scan Summary"
            echo "- Installed skills scanned: $total"
            echo "- Deprecated skills found: ${#deprecated_skills[@]}"
            if [ ${#deprecated_skills[@]} -gt 0 ]; then
              echo ""
              echo "### Deprecated skills"
              printf '%s\n' "${deprecated_skills[@]}" | sed 's/^/- /'
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  # =========================================================================
  # JOB 3: Create one removal PR per deprecated skill
  # =========================================================================
  # For each deprecated skill, create a pull request that:
  #   - Removes the skill via `npx skills remove`
  #   - Documents successor skill and migration path in the PR body
  remove_deprecated:
    name: Remove deprecated skill
    needs: detect_deprecated
    if: needs.detect_deprecated.outputs.has_deprecated == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        skill: ${{ fromJson(needs.detect_deprecated.outputs.deprecated_skills) }}

    permissions:
      contents: write
      pull-requests: write

    steps:
      # -------------------------------------------------------------------
      # STEP 1: Checkout repository
      # -------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v6

      # -------------------------------------------------------------------
      # STEP 2: Evaluate prior pull request state
      # -------------------------------------------------------------------
      # Check whether an open or previously-rejected PR already exists
      # for this skill's deprecation branch. Avoids duplicate PRs and
      # respects team decisions to keep a skill temporarily.
      - name: Evaluate prior pull request state for skill
        id: pr_state
        uses: actions/github-script@v8
        env:
          SKILL: ${{ matrix.skill }}
          SKIP_REJECTED: ${{ inputs.skip-if-rejected-pr-exists }}
        with:
          github-token: ${{ github.token }}
          script: |
            const skill = process.env.SKILL;
            const skipRejected = process.env.SKIP_REJECTED === "true";
            const { owner, repo } = context.repo;
            const branch = `chore/skills-deprecation/${skill}`;

            const outputs = {
              mode: "create-new",
              blocked: "false",
              open_exists: "false",
              open_url: "",
              rejected_exists: "false",
              rejected_url: "",
            };

            const openPrs = await github.paginate(github.rest.pulls.list, {
              owner,
              repo,
              state: "open",
              head: `${owner}:${branch}`,
              per_page: 100,
            });
            const openPr = openPrs.find((pr) => pr.head?.ref === branch);

            if (openPr) {
              outputs.mode = "update-open";
              outputs.open_exists = "true";
              outputs.open_url = openPr.html_url;
              core.notice(`Open deprecation PR exists for ${skill}; will update ${openPr.html_url}.`);
            } else {
              const closedPrs = await github.paginate(github.rest.pulls.list, {
                owner,
                repo,
                state: "closed",
                head: `${owner}:${branch}`,
                per_page: 100,
              });
              const rejectedPr = closedPrs.find(
                (pr) => pr.head?.ref === branch && !pr.merged_at,
              );

              if (rejectedPr) {
                outputs.rejected_exists = "true";
                outputs.rejected_url = rejectedPr.html_url;
                if (skipRejected) {
                  outputs.mode = "blocked-rejected";
                  outputs.blocked = "true";
                  core.notice(
                    `Skipping ${skill}; previous removal PR was closed without merge: ${rejectedPr.html_url}.`,
                  );
                }
              }
            }

            for (const [key, value] of Object.entries(outputs)) {
              core.setOutput(key, value);
            }

      # -------------------------------------------------------------------
      # STEP 3: Extract deprecation metadata
      # -------------------------------------------------------------------
      # Look up the skill's actual install path via CLI, then parse
      # successor and description from SKILL.md frontmatter.
      - name: Extract deprecation metadata
        if: steps.pr_state.outputs.blocked != 'true'
        id: metadata
        shell: bash
        env:
          SKILL: ${{ matrix.skill }}
        run: |
          set -euo pipefail

          successor=""
          description=""

          # Resolve actual install path via CLI
          skill_path=$(npx -y skills list --json 2>/dev/null \
            | jq -r --arg s "$SKILL" '.[] | select(.name == $s) | .path' \
            | head -1)

          skill_md="${skill_path}/SKILL.md"
          if [ -n "$skill_path" ] && [ -f "$skill_md" ]; then
            # Extract YAML frontmatter (content between first --- pair)
            frontmatter=$(awk '/^---$/{if(++c==2)exit}c==1' "$skill_md")

            successor=$(printf '%s\n' "$frontmatter" \
              | sed -nE 's/^\s*successor:\s*"?([^"]+)"?\s*$/\1/p' \
              | head -1 | xargs)

            description=$(printf '%s\n' "$frontmatter" \
              | sed -nE 's/^\s*description:\s*"?([^"]*)"?\s*$/\1/p' \
              | head -1 | xargs)
          fi

          echo "successor=${successor}" >> "$GITHUB_OUTPUT"
          echo "description=${description}" >> "$GITHUB_OUTPUT"

      # -------------------------------------------------------------------
      # STEP 4: Remove the deprecated skill
      # -------------------------------------------------------------------
      # Use the skills CLI to remove the skill — it knows the correct
      # install path and handles skills-lock.json cleanup.
      - name: Remove deprecated skill
        if: steps.pr_state.outputs.blocked != 'true'
        shell: bash
        env:
          SKILL: ${{ matrix.skill }}
        run: |
          set -euo pipefail
          npx -y skills remove "$SKILL" -y
          echo "Removed $SKILL via skills CLI"

      # -------------------------------------------------------------------
      # STEP 5: Check whether removal produced changes
      # -------------------------------------------------------------------
      - name: Check whether changes were produced
        id: has_changes
        if: steps.pr_state.outputs.blocked != 'true'
        shell: bash
        env:
          SKILL: ${{ matrix.skill }}
        run: |
          set -euo pipefail

          if git diff --quiet --exit-code HEAD; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes for $SKILL (skill may already be removed)."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      # -------------------------------------------------------------------
      # STEP 6: Build pull request body
      # -------------------------------------------------------------------
      - name: Build pull request body
        if: steps.pr_state.outputs.blocked != 'true' && steps.has_changes.outputs.changed == 'true'
        shell: bash
        env:
          SKILL: ${{ matrix.skill }}
          SUCCESSOR: ${{ steps.metadata.outputs.successor }}
          DESCRIPTION: ${{ steps.metadata.outputs.description }}
        run: |
          set -euo pipefail
          body="pr-body-${SKILL}.md"

          {
            echo "## Why"
            echo ""
            echo "The skill \`$SKILL\` has been deprecated upstream."
            if [ -n "$SUCCESSOR" ]; then
              echo "The recommended replacement is \`$SUCCESSOR\`."
            fi

            echo ""
            echo "## Current behavior"
            echo ""
            echo "The deprecated skill \`$SKILL\` is still installed locally."

            echo ""
            echo "## New behavior"
            echo ""
            echo "- Removes \`$SKILL\` from installed skills"
            echo "- Updates lock file to remove the entry"
            if [ -n "$SUCCESSOR" ]; then
              echo "- **Migration**: replace usage with \`$SUCCESSOR\`"
            fi

            echo ""
            echo "## References"
            echo ""
            echo "- Workflow run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            if [ -n "$SUCCESSOR" ]; then
              echo "- Successor skill: \`$SUCCESSOR\`"
            fi

            echo ""
            echo "## Reviewer focus"
            echo ""
            echo "- Confirm \`$SKILL\` is no longer referenced in project configuration"
            echo "- Verify the skill and lock file removal is correct"
            if [ -n "$SUCCESSOR" ]; then
              echo "- Ensure successor \`$SUCCESSOR\` is installed before merging"
            fi
          } > "$body"

      # -------------------------------------------------------------------
      # STEP 7: Create pull request
      # -------------------------------------------------------------------
      - name: Create pull request
        if: steps.pr_state.outputs.blocked != 'true' && steps.has_changes.outputs.changed == 'true'
        id: create_pr
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ github.token }}
          commit-message: "chore(skills): remove deprecated skill ${{ matrix.skill }}"
          title: "chore(skills): remove deprecated skill ${{ matrix.skill }}"
          body-path: pr-body-${{ matrix.skill }}.md
          branch: chore/skills-deprecation/${{ matrix.skill }}
          base: ${{ github.event.repository.default_branch }}
          draft: ${{ inputs.draft-deprecation-prs || false }}
          delete-branch: true
          labels: |
            skills
            automation
            deprecation

      # -------------------------------------------------------------------
      # STEP 8: Report job summary
      # -------------------------------------------------------------------
      - name: Job summary
        if: always()
        shell: bash
        env:
          SUCCESSOR: ${{ steps.metadata.outputs.successor }}
        run: |
          set -euo pipefail
          {
            echo "## Skill Deprecation: \`${{ matrix.skill }}\`"

            if [ -n "$SUCCESSOR" ]; then
              echo "- Successor: \`$SUCCESSOR\`"
            fi

            if [ "${{ steps.pr_state.outputs.blocked }}" = "true" ]; then
              echo "- Skipped: previous removal PR was closed without merge (${{ steps.pr_state.outputs.rejected_url }})"
            elif [ "${{ steps.has_changes.outputs.changed }}" = "true" ] && [ -n "${{ steps.create_pr.outputs.pull-request-url }}" ]; then
              if [ "${{ steps.pr_state.outputs.mode }}" = "update-open" ]; then
                echo "- Pull request updated: ${{ steps.create_pr.outputs.pull-request-url }}"
              else
                echo "- Pull request created: ${{ steps.create_pr.outputs.pull-request-url }}"
              fi
            elif [ "${{ steps.pr_state.outputs.open_exists }}" = "true" ] && [ "${{ steps.has_changes.outputs.changed }}" = "false" ]; then
              echo "- Existing PR already up to date: ${{ steps.pr_state.outputs.open_url }}"
            elif [ "${{ steps.has_changes.outputs.changed }}" = "false" ]; then
              echo "- No PR created (skill already removed)."
            else
              echo "- PR creation did not produce a URL."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
