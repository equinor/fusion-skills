name: Validate Skills Catalog (Reusable)

on:
  workflow_call:

permissions:
  contents: read

jobs:
  validate_skills:
    name: Validate skills and counts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate skills and counts
        id: validate_skills
        run: bun run validate:skills

      - name: Job summary
        if: always()
        run: |
          {
            echo "## Validate skills and counts"
            echo
            echo "- Result: ${{ steps.validate_skills.outcome }}"
            echo "- Command: \\`bun run validate:skills\\`"
          } >> "$GITHUB_STEP_SUMMARY"
