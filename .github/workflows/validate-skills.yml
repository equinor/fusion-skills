name: Validate Skills

on:
  pull_request:
    paths:
      - "skills/**"
      - ".changeset/**"
      - ".github/workflows/validate-skills.yml"
  push:
    branches:
      - main
    paths:
      - "skills/**"
      - ".changeset/**"
      - ".github/workflows/validate-skills.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: validate-skills-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect_changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      skills_changed: ${{ steps.filter.outputs.skills }}
      graphql_changed: ${{ steps.filter.outputs.graphql }}
      skill_scripts_changed: ${{ steps.filter.outputs.skill_scripts }}
      changesets_changed: ${{ steps.filter.outputs.changesets }}
      workflow_changed: ${{ steps.filter.outputs.workflow }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Filter changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            skills:
              - 'skills/**'
            graphql:
              - 'skills/**/assets/graphql/*.github.graphql'
              - 'codegen.github.yml'
            skill_scripts:
              - 'skills/**/scripts/**'
            changesets:
              - '.changeset/*.md'
              - '!.changeset/README.md'
            workflow:
              - '.github/workflows/validate-skills.yml'

  validate_skills:
    name: Validate skills and counts
    needs: detect_changes
    if: github.event_name == 'workflow_dispatch' || needs.detect_changes.outputs.skills_changed == 'true' || needs.detect_changes.outputs.workflow_changed == 'true'
    uses: ./.github/workflows/validate-skills-catalog.yml

  validate_graphql:
    name: Validate GraphQL assets and operations
    needs: detect_changes
    if: github.event_name == 'workflow_dispatch' || needs.detect_changes.outputs.graphql_changed == 'true' || needs.detect_changes.outputs.workflow_changed == 'true'
    uses: ./.github/workflows/validate-skills-graphql.yml

  shellcheck_skill_scripts:
    name: ShellCheck changed skill scripts
    needs: detect_changes
    if: github.event_name == 'workflow_dispatch' || needs.detect_changes.outputs.skill_scripts_changed == 'true'
    uses: ./.github/workflows/validate-skills-shellcheck.yml

  validate_pr:
    name: Validate skill version bumps and changesets
    needs: detect_changes
    if: github.event_name == 'pull_request' && (needs.detect_changes.outputs.skills_changed == 'true' || needs.detect_changes.outputs.changesets_changed == 'true' || needs.detect_changes.outputs.workflow_changed == 'true')
    uses: ./.github/workflows/validate-skills-pr.yml

  changeset_summary_comment:
    name: Comment changeset summary
    needs: detect_changes
    if: github.event_name == 'pull_request' && (needs.detect_changes.outputs.changesets_changed == 'true' || needs.detect_changes.outputs.workflow_changed == 'true')
    uses: ./.github/workflows/validate-skills-changeset-comment.yml
