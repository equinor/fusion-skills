name: Validate Skills

on:
  pull_request:
    paths:
      - "skills/**"
      - ".changeset/**"
      - ".github/workflows/validate-skills.yml"
  push:
    branches:
      - main
    paths:
      - "skills/**"
      - ".changeset/**"
      - ".github/workflows/validate-skills.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: validate-skills-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect_changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      skills_changed: ${{ steps.filter.outputs.skills }}
      graphql_changed: ${{ steps.filter.outputs.graphql }}
      skill_scripts_changed: ${{ steps.filter.outputs.skill_scripts }}
      changesets_changed: ${{ steps.filter.outputs.changesets }}
      workflow_changed: ${{ steps.filter.outputs.workflow }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Filter changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            skills:
              - 'skills/**'
            graphql:
              - 'skills/**/assets/graphql/*.github.graphql'
              - 'codegen.github.yml'
            skill_scripts:
              - 'skills/**/scripts/**'
            changesets:
              - '.changeset/*.md'
              - '!.changeset/README.md'
            workflow:
              - '.github/workflows/validate-skills.yml'

  validate_skills:
    name: Validate skills and counts
    needs: detect_changes
    if: github.event_name == 'workflow_dispatch' || needs.detect_changes.outputs.skills_changed == 'true' || needs.detect_changes.outputs.workflow_changed == 'true'
    uses: ./.github/workflows/validate-skills-catalog.yml

  validate_graphql:
    name: Validate GraphQL assets and operations
    needs: detect_changes
    if: github.event_name == 'workflow_dispatch' || needs.detect_changes.outputs.graphql_changed == 'true' || needs.detect_changes.outputs.workflow_changed == 'true'
    uses: ./.github/workflows/validate-skills-graphql.yml

  shellcheck_skill_scripts:
    name: ShellCheck changed skill scripts
    needs: detect_changes
    if: github.event_name == 'workflow_dispatch' || needs.detect_changes.outputs.skill_scripts_changed == 'true'
    uses: ./.github/workflows/validate-skills-shellcheck.yml

  validate_pr:
    name: Validate skill version bumps and changesets
    needs: detect_changes
    if: github.event_name == 'pull_request' && (needs.detect_changes.outputs.skills_changed == 'true' || needs.detect_changes.outputs.changesets_changed == 'true' || needs.detect_changes.outputs.workflow_changed == 'true')
    uses: ./.github/workflows/validate-skills-pr.yml

  changeset_summary_comment:
    name: Comment changeset summary
    needs: detect_changes
    if: github.event_name == 'pull_request' && (needs.detect_changes.outputs.changesets_changed == 'true' || needs.detect_changes.outputs.workflow_changed == 'true')
    permissions:
      contents: read
      pull-requests: write
    uses: ./.github/workflows/validate-skills-changeset-comment.yml

  validate_summary:
    name: Validate skills summary
    if: always()
    needs:
      - detect_changes
      - validate_skills
      - validate_graphql
      - shellcheck_skill_scripts
      - validate_pr
      - changeset_summary_comment
    runs-on: ubuntu-latest
    steps:
      - name: Build validation summary
        env:
          DETECT_CHANGES_RESULT: ${{ needs.detect_changes.result }}
          VALIDATE_SKILLS_RESULT: ${{ needs.validate_skills.result }}
          VALIDATE_GRAPHQL_RESULT: ${{ needs.validate_graphql.result }}
          SHELLCHECK_RESULT: ${{ needs.shellcheck_skill_scripts.result }}
          VALIDATE_PR_RESULT: ${{ needs.validate_pr.result }}
          CHANGESET_COMMENT_RESULT: ${{ needs.changeset_summary_comment.result }}
        run: |
          {
            echo "## Validate Skills Summary"
            echo
            echo "- Detect changed paths: ${DETECT_CHANGES_RESULT}"
            echo "- Validate skills and counts: ${VALIDATE_SKILLS_RESULT}"
            echo "- Validate GraphQL assets and operations: ${VALIDATE_GRAPHQL_RESULT}"
            echo "- ShellCheck changed skill scripts: ${SHELLCHECK_RESULT}"
            echo "- Validate skill version bumps and changesets: ${VALIDATE_PR_RESULT}"
            echo "- Comment changeset summary: ${CHANGESET_COMMENT_RESULT}"
          } >> "$GITHUB_STEP_SUMMARY"

          failed=0
          for status in "$DETECT_CHANGES_RESULT" "$VALIDATE_SKILLS_RESULT" "$VALIDATE_GRAPHQL_RESULT" "$SHELLCHECK_RESULT" "$VALIDATE_PR_RESULT" "$CHANGESET_COMMENT_RESULT"; do
            if [[ "$status" == "failure" || "$status" == "cancelled" || "$status" == "timed_out" ]]; then
              failed=1
            fi
          done

          if [[ "$failed" -eq 1 ]]; then
            echo "One or more validate-skills jobs failed or were cancelled."
            exit 1
          fi
