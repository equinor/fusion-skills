name: Validate Skills PR (Reusable)

on:
  workflow_call:

permissions:
  contents: read

jobs:
  validate_pr:
    name: Validate skill version bumps and changesets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate skill version bumps and changesets (PR only)
        id: validate_pr
        run: bun run validate:pr

      - name: Job summary
        if: always()
        run: |
          {
            echo "## Validate skill version bumps and changesets"
            echo
            echo "- Result: ${{ steps.validate_pr.outcome }}"
            echo "- Command: \\`bun run validate:pr\\`"
          } >> "$GITHUB_STEP_SUMMARY"
