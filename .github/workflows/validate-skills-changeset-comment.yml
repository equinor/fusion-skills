name: Validate Skills Changeset Comment (Reusable)

on:
  workflow_call:

permissions:
  contents: read
  pull-requests: write

jobs:
  changeset_summary_comment:
    name: Comment changeset summary
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect changed changeset files (PR only)
        id: changed_changesets
        uses: tj-actions/changed-files@v47
        with:
          files: |
            .changeset/*.md
            !.changeset/README.md

      - name: Build changeset comment body (PR only)
        id: build_summary
        run: |
          mkdir -p .tmp
          {
            echo "## Changeset summary"
            echo

            if [[ -z "${{ steps.changed_changesets.outputs.all_changed_files }}" ]]; then
              echo 'No `.changeset/*.md` files were changed in this PR.'
            else
              # Use tr to split space-separated file list into lines
              mapfile -t files < <(echo "${{ steps.changed_changesets.outputs.all_changed_files }}" | tr ' ' '\n' | sed '/^$/d' | sort)
              echo "Detected ${#files[@]} changeset file(s):"
              for file in "${files[@]}"; do
                echo
                echo "**$file:**"
                echo '```md'
                cat "$file"
                echo '```'
              done
            fi
          } > .tmp/changeset-summary.md

      - name: Comment changeset summary (PR only)
        id: post_comment
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          path: .tmp/changeset-summary.md
          header: changeset-summary

      - name: Job summary
        if: always()
        run: |
          {
            echo "## Comment changeset summary"
            echo
            echo "- Changesets detected: ${{ steps.changed_changesets.outputs.any_changed }}"
            echo "- Build summary step: ${{ steps.build_summary.outcome }}"
            echo "- Post comment step: ${{ steps.post_comment.outcome }}"

            if [[ "${{ steps.changed_changesets.outputs.any_changed }}" == "true" ]]; then
              echo "- Changeset files:"
              echo '```text'
              echo "${{ steps.changed_changesets.outputs.all_changed_files }}" | tr ' ' '\n' | sed '/^$/d'
              echo '```'
            fi
          } >> "$GITHUB_STEP_SUMMARY"
