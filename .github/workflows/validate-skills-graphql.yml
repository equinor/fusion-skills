name: Validate Skills GraphQL (Reusable)

on:
  workflow_call:

permissions:
  contents: read

jobs:
  validate_graphql:
    name: Validate GraphQL assets and operations
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate GraphQL skill assets
        run: bun run validate:graphql

      - name: Validate GraphQL operations with Codegen
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: bun run validate:graphql:codegen
